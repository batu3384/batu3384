  <text x="826" y="158" fill="#597187" font-size="14" font-family="Arial, Helvetica, sans-serif">Apple tools, workflow software, privacy-first UX</text>

  <text x="826" y="206" fill="#0F172A" font-size="21" font-weight="700" font-family="Arial, Helvetica, sans-serif">Security and terminal tooling</text>
  <text x="826" y="226" fill="#597187" font-size="14" font-family="Arial, Helvetica, sans-serif">Safer destructive flows, audits, and AppSec automation</text>


  <rect x="804" y="182" width="378" height="56" rx="18" fill="#FFFFFF" stroke="#D7E2EC"/>
  <rect x="804" y="250" width="378" height="56" rx="18" fill="#FFFFFF" stroke="#D7E2EC"/>


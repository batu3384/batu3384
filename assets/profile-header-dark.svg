<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="84" y1="40" x2="1184" y2="362" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06101B"/>
      <stop offset="1" stop-color="#0A1726"/>
    </linearGradient>
    <linearGradient id="panel" x1="782" y1="64" x2="1188" y2="336" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F2033"/>

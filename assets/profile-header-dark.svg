  <text x="242" y="352" fill="#D8E4EF" font-size="13" font-family="Arial, Helvetica, sans-serif">MIS @ Dokuz Eylul University</text>
  <text x="474" y="352" fill="#D8E4EF" font-size="13" font-family="Arial, Helvetica, sans-serif">TR / EN</text>


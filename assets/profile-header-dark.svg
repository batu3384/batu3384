    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(206 108) rotate(90) scale(200)">
      <stop stop-color="#22D3EE" stop-opacity="0.25"/>
